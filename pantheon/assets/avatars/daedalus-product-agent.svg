  <rect x="74" y="74" width="52" height="52" rx="3" stroke="#E74C3C" stroke-width="2"/>
  <rect x="86" y="86" width="28" height="28" rx="2" stroke="#E74C3C" stroke-width="1.5"/>
  <!-- Center square (the product) -->
  <rect x="93" y="93" width="14" height="14" rx="2" fill="#E74C3C" fill-opacity="0.4" stroke="#E74C3C" stroke-width="1.5"/>
  <!-- Labyrinth gaps/paths -->
