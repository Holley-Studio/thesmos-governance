name: Bug Report
description: Report a bug in the Thesmos CLI, VS Code extension, GitHub Action, or MCP server
labels: ["bug", "needs-triage"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Thesmos is affected?
      options:
        - CLI (`thesmos` command)
        - VS Code Extension
        - GitHub Action (`actions/pr-review`)
        - MCP Server
        - npm package / API
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Thesmos Version
      description: Run `npx thesmos --version` or check your package.json
      placeholder: "4.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Run `node --version`
      placeholder: "v22.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `thesmos scan`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error messages, stack traces, or unexpected output

  - type: textarea
    id: config
    attributes:
      label: Config (optional)
      description: Paste your `.thesmos/config.json` if relevant (redact secrets)
      render: json
