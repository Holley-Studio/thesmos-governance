version: 2
updates:
  # Root workspace dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - Holley-Studio
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsup"
          - "tsx"
          - "vitest"
          - "@vitest/*"
          - "esbuild"
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    reviewers:
      - Holley-Studio
