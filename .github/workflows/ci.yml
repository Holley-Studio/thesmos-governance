name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for GitHub Actions runner (suppresses Node 20 deprecation warnings)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Typecheck / Test / Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          # Use root lockfile — this is an npm workspaces monorepo
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (core)
        working-directory: thesmos
        run: npm run typecheck

      - name: Typecheck (vscode extension)
        working-directory: extensions/vscode
        run: npm run typecheck

      - name: Build
        working-directory: thesmos
        run: npm run build

      - name: Typecheck (pr-review action)
        working-directory: actions/pr-review
        run: npm run typecheck

      - name: Test
        working-directory: thesmos
        run: npm test

      - name: Test coverage
        if: matrix.node-version == '22.x'
        working-directory: thesmos
        run: npm run test:coverage

      - name: Build (vscode extension)
        working-directory: extensions/vscode
        run: npm run build

      - name: Test (vscode extension)
        working-directory: extensions/vscode
        run: npm run test

      - name: Test (pr-review action)
        working-directory: actions/pr-review
        run: npm test

      - name: Build (pr-review action)
        working-directory: actions/pr-review
        run: npm run build

      - name: Governance SARIF scan
        id: sarif_scan
        if: matrix.node-version == '22.x'
        continue-on-error: true
        # Must run from repo root — validate loads .thesmos/report.json via cwd.
        run: |
          set +e
          node thesmos/dist/cli.js validate --sarif > governance.sarif
          STATUS=$?
          set -e
          if [ ! -s governance.sarif ]; then
            echo "error: SARIF output missing or empty (validate exit=$STATUS)"
            exit 1
          fi
          python3 -c "import json; d=json.load(open('governance.sarif')); assert 'runs' in d, 'invalid SARIF'"
          exit $STATUS

      - name: Upload SARIF to GitHub Security tab
        if: matrix.node-version == '22.x' && always() && hashFiles('governance.sarif') != ''
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: governance.sarif
          category: thesmos-governance
        continue-on-error: true   # upload service may be unavailable; generation is required above

      - name: Fail when governance validate failed
        if: matrix.node-version == '22.x' && steps.sarif_scan.outcome == 'failure'
        run: |
          echo "Governance validate failed — see SARIF scan step"
          exit 1

      - name: Product facts freshness
        if: matrix.node-version == '22.x'
        working-directory: thesmos
        run: npx tsx -e "import { productFactsAreFresh } from './product-facts.ts'; const r = productFactsAreFresh(); if (!r.fresh) { console.error(r.detail); process.exit(1); } console.log(r.detail);"

      - name: Thesmos CI gate (health ≥ 90)
        if: matrix.node-version == '22.x'
        run: node thesmos/dist/cli.js ci --json --health-threshold=90

      - name: Upload coverage to Codecov
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          directory: thesmos/coverage/
          flags: core
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload coverage artifact
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: thesmos/coverage/
          retention-days: 7

  # Cross-platform guard: real Node entry + Windows wrapper path (Operation Aegis).
  # Does not require Bash/WSL — exercises dist/thesmos-guard.js on windows-latest.
  guard-windows:
    name: Guard (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js 22.x
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build thesmos (emits dist/thesmos-guard.js)
        working-directory: thesmos
        run: npm run build

      - name: Assert guard entry exists
        working-directory: thesmos
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/thesmos-guard.js")) {
            throw "dist/thesmos-guard.js missing after build"
          }

      - name: Cross-platform guard tests
        working-directory: thesmos
        run: npx vitest run guard.cross-platform.test.ts

  # Status-check aggregator: branch ruleset requires a check named "typecheck".
  # This job runs only after all matrix legs of `ci` pass, creating exactly
  # that context so the ruleset is satisfied on every PR.
  typecheck:
    runs-on: ubuntu-latest
    needs: [ci, guard-windows]
    steps:
      - run: echo "All CI checks passed"
