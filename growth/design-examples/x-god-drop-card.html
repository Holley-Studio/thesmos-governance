<!DOCTYPE html>
<!--
  X / Twitter announcement card for growth/god-drop-template.md
  Canvas: 1200x675 (twitter:card summary_large_image ratio)
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_theme.css" />
<style>
  body { width: 1200px; height: 675px; }
  .canvas { width: 1200px; height: 675px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px; }
  .eyebrow { justify-content: center; font-size: 18px; margin-bottom: 26px; }
  .glyph-big { font-size: 96px; margin-bottom: 18px; filter: drop-shadow(0 0 40px rgba(201,168,76,.35)); }
  .name { font-size: 56px; font-weight: 700; color: var(--cream); margin-bottom: 10px; }
  .name strong { color: var(--gold); }
  .domain { font-size: 22px; color: var(--t2); margin-bottom: 30px; }
  .desc { font-size: 19px; color: var(--t2); max-width: 760px; line-height: 1.6; margin-bottom: 34px; }
  .desc strong { color: var(--cream); font-weight: 600; }
  .cta { font-size: 15px; letter-spacing: .05em; color: var(--gold); border: 1px solid var(--border-h); padding: 12px 26px; border-radius: 30px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="eyebrow">⚡ NEW GOD UNLOCKED</div>
  <div class="glyph-big">🧿</div>
  <div class="name serif">TECHNE <strong>joins the Pantheon</strong></div>
  <div class="domain">Design System Neuroarchitect &nbsp;·&nbsp; Token Governance</div>
  <div class="desc">Audits every Figma variable against your live design system and catches
    <strong>token drift before it ships</strong> — the god that keeps your components honest.</div>
  <div class="cta mono">67 AGENTS · 10 PLATFORMS · HOLLEY.STUDIO/GO/X.HTML</div>
</div>
</body>
</html>
