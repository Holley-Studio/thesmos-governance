<!DOCTYPE html>
<!--
  Email header banner for growth/god-drop-template.md ("Email — to all Gumroad customers")
  Canvas: 1200x400 — fits a standard email width (600pt @2x)
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_theme.css" />
<style>
  body { width: 1200px; height: 400px; }
  .canvas { width: 1200px; height: 400px; display: flex; align-items: center; justify-content: space-between; padding: 0 70px; }
  .left { max-width: 640px; }
  .eyebrow { font-size: 15px; margin-bottom: 16px; }
  .title { font-size: 38px; color: var(--cream); line-height: 1.25; margin-bottom: 12px; }
  .title strong { color: var(--gold); }
  .sub { font-size: 17px; color: var(--t2); }
  .right {
    width: 190px; height: 190px; border-radius: 50%;
    border: 1px solid var(--border-h);
    background: radial-gradient(circle, rgba(201,168,76,.14), transparent 70%);
    display: flex; align-items: center; justify-content: center;
    font-size: 88px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="left">
    <div class="eyebrow">⚡ NEW GOD UNLOCKED</div>
    <div class="title serif"><strong>Techne</strong> joins the council</div>
    <div class="sub">Design System Neuroarchitect — token governance for every Figma file you own.</div>
  </div>
  <div class="right">🧿</div>
</div>
</body>
</html>
